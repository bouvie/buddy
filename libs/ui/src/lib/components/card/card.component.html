<div
  class="card"
  [class.card--no-border]="!border()"
  [class.card--elevation-none]="elevation() === 'none'"
  [class.card--elevation-sm]="elevation() === 'sm'"
  [class.card--elevation-md]="elevation() === 'md'"
  [class.card--elevation-lg]="elevation() === 'lg'"
  [class.card--padding-none]="padding() === 'none'"
  [class.card--padding-sm]="padding() === 'sm'"
  [class.card--padding-md]="padding() === 'md'"
  [class.card--padding-lg]="padding() === 'lg'"
  [class.card--interactive]="interactive()"
  [class.card--live]="isLive()"
>
  @if (title()) {
    <div class="card__header">
      <h3>{{ title() }}</h3>
    </div>
  }
  <div class="card__body">
    <ng-content></ng-content>
  </div>
  @if (footer()) {
    <div class="card__footer">
      <ng-content select="[card-footer]"></ng-content>
    </div>
  }
</div>
