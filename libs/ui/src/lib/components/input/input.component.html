<div
  class="input-field-container"
  [class.input-field-container--error]="hasError()"
  [class.input-field-container--success]="hasSuccess()"
  [class.input-field-container--disabled]="disabled()"
  [class.input-field-container--filled]="filled()"
>
  <input
    [type]="safeType()"
    [id]="id()"
    class="input-field"
    [placeholder]="placeholder()"
    [disabled]="disabled()"
    [readOnly]="readOnly()"
    [value]="value()"
    [attr.aria-invalid]="hasError() || null"
    (input)="onInput($event)"
    (blur)="onBlur($event)"
    (focus)="onFocus($event)"
  />
  @if (hasError()) {
    <span class="input-icon input-icon--error" aria-hidden="true">!</span>
  } @else if (hasSuccess()) {
    <span class="input-icon input-icon--success" aria-hidden="true">v</span>
  }
</div>
