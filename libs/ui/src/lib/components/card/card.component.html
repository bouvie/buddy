<div
  class="card"
  [class.card--default]="safeVariant() === 'default'"
  [class.card--elevated]="safeVariant() === 'elevated'"
  [class.card--outlined]="safeVariant() === 'outlined'"
  [class.card--primary]="safeVariant() === 'primary'"
  [class.card--accent]="safeVariant() === 'accent'"
  [class.card--glass]="safeVariant() === 'glass'"
  [class.card--padding-none]="padding() === 'none'"
  [class.card--padding-sm]="padding() === 'sm'"
  [class.card--padding-md]="padding() === 'md'"
  [class.card--padding-lg]="padding() === 'lg'"
  [class.card--interactive]="interactive()"
  [class.card--live]="isLive()"
>
  @if (safeVariant() === 'primary' || safeVariant() === 'accent') {
    <div class="card__tint-bar"></div>
  }
  @if (title()) {
    <div class="card__header">
      <h3>{{ title() }}</h3>
    </div>
  }
  <div class="card__body">
    <ng-content></ng-content>
  </div>
  @if (footer()) {
    <div class="card__footer">
      <ng-content select="[card-footer]"></ng-content>
    </div>
  }
</div>
