## EMQX Configuration — Buddy Dev
## Dashboard : http://localhost:18083 (admin / public)

node {
  name = "buddy-emqx@127.0.0.1"
  cookie = "buddy_emqx_dev_cookie"
  data_dir = "/opt/emqx/data"
}

log {
  console {
    level = warning
  }
}

listeners.tcp.default {
  bind = "0.0.0.0:1883"
  max_connections = 1024000
}

## Authentification — désactivée en dev (API key enforced en prod)
## En prod : remplacer par auth.http ou auth.jwt
authentication = []

## Autorisation — allow all en dev
authorization {
  no_match = allow
  deny_action = ignore
  cache {
    enable = true
    max_size = 32
    ttl = 1m
  }
  sources = []
}

## Topic convention : devices/{deviceId}/telemetry
