<!-- ─── SKELETON ──────────────────────────────────────────────────────────── -->
@if (safeVariant() === 'skeleton') {
  <div class="chart-card chart-card--skeleton">
    <k9-skeleton shape="rectangle" class="chart-card__sk-title"></k9-skeleton>
    <k9-skeleton shape="rectangle" class="chart-card__sk-chart"></k9-skeleton>
  </div>
}

<!-- ─── EMPTY ──────────────────────────────────────────────────────────────── -->
@if (safeVariant() === 'empty') {
  <div class="chart-card chart-card--empty">
    <i [class]="emptyIcon()" class="chart-card__empty-icon" aria-hidden="true"></i>
    <span class="chart-card__empty-label">{{ emptyMessage() }}</span>
  </div>
}

<!-- ─── CHART (line-area | bar) ───────────────────────────────────────────── -->
@if (isChart()) {
  <div class="chart-card chart-card--populated" [class.chart-card--live]="isLive()">
    <div class="chart-card__header">
      <div class="chart-card__meta">
        <span class="chart-card__title">{{ title() }}</span>
        @if (headerValue()) {
          <div class="chart-card__value-row">
            <span class="chart-card__value">{{ headerValue() }}</span>
            @if (unit()) {
              <span class="chart-card__unit">{{ unit() }}</span>
            }
          </div>
        }
      </div>
      @if (isLive()) {
        <span class="chart-card__live-badge">LIVE</span>
      }
    </div>

    <div
      echarts
      [options]="chartOptions()"
      theme="k9"
      renderer="svg"
      class="chart-card__chart"
    ></div>
  </div>
}
