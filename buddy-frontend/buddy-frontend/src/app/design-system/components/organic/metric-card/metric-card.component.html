<!-- ─── LOADING ─────────────────────────────────────────────────────────── -->
@if (safeVariant() === 'loading') {
  <div class="metric-card metric-card--loading">
    <div class="metric-card__header-row">
      <app-skeleton shape="rectangle" class="metric-card__sk-label"></app-skeleton>
      <app-skeleton shape="rectangle" class="metric-card__sk-badge"></app-skeleton>
    </div>
    <div class="metric-card__value-row">
      <app-skeleton shape="rectangle" class="metric-card__sk-value"></app-skeleton>
    </div>
    <app-skeleton shape="rectangle" class="metric-card__sk-bar"></app-skeleton>
  </div>
}

<!-- ─── EMPTY ──────────────────────────────────────────────────────────── -->
@if (safeVariant() === 'empty') {
  <div class="metric-card metric-card--empty">
    <i [class]="emptyIcon()" class="metric-card__empty-icon" aria-hidden="true"></i>
    <span class="metric-card__empty-label">{{ emptyMessage() }}</span>
  </div>
}

<!-- ─── ACTIVE ─────────────────────────────────────────────────────────── -->
@if (safeVariant() === 'active') {
  <div class="metric-card metric-card--active">
    <div class="metric-card__header-row">
      <span class="metric-card__label">{{ label() }}</span>
      <span
        class="metric-card__trend"
        [class.metric-card__trend--up]="trendDirection() === 'up'"
        [class.metric-card__trend--down]="trendDirection() === 'down'"
      >
        <i
          class="metric-card__trend-icon"
          [class.fa-solid]="true"
          [class.fa-arrow-trend-up]="trendDirection() === 'up'"
          [class.fa-arrow-trend-down]="trendDirection() === 'down'"
          aria-hidden="true"
        ></i>
        {{ trendLabel() }}
      </span>
    </div>

    <div class="metric-card__value-row">
      <span class="metric-card__value">{{ value() }}</span>
      <span class="metric-card__unit">{{ unit() }}</span>
    </div>

    <div class="metric-card__bar-track">
      <div
        class="metric-card__bar-fill"
        [style.width.%]="clampedProgress()"
        role="progressbar"
        [attr.aria-valuenow]="clampedProgress()"
        aria-valuemin="0"
        aria-valuemax="100"
      ></div>
    </div>
  </div>
}
