<span
  class="badge"
  [class.badge--primary]="safeVariant() === 'primary'"
  [class.badge--accent]="safeVariant() === 'accent'"
  [class.badge--secondary]="safeVariant() === 'secondary'"
  [class.badge--danger]="safeVariant() === 'danger'"
  [class.badge--success]="safeVariant() === 'success'"
  [class.badge--warning]="safeVariant() === 'warning'"
  [class.badge--info]="safeVariant() === 'info'"
  [class.badge--neutral]="safeVariant() === 'neutral'"
>
  @if (dot() || safeVariant() === 'accent') {
    <span class="badge__dot" aria-hidden="true"></span>
  }
  <ng-content></ng-content>
</span>
