# Redis Configuration — Buddy Dev
# Optimisé pour Redis Streams (event bus ingest → analysis)

# Persistance AOF pour ne pas perdre les events en cas de restart
appendonly yes
appendfsync everysec

# Taille max des Streams (eviction automatique)
# ~1000 events max par stream en dev
# En prod : laisser infini et utiliser la rétention applicative
# maxmemory-policy noeviction

# Pas de mot de passe en dev
# requirepass buddy_redis_dev

# Bind sur toutes les interfaces (container)
bind 0.0.0.0
protected-mode no
