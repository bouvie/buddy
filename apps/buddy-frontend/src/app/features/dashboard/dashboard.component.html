<section class="dashboard__grid" aria-label="Health charts">
  <k10-card
    class="dashboard__map-card"
    title="Position Map"
    padding="none"
    variant="primary"
    [isLive]="true"
  >
    <k10-map height="360px" [appMapLocation]="dogId" />
  </k10-card>
  <k10-chart-card [appHeartRateChart]="dogId"></k10-chart-card>
  <k10-chart-card [appSleepTimeChart]="dogId"></k10-chart-card>
  <div
    class="dashboard__activity-list"
    [appActivityReport]="dogId"
    #activityReport="appActivityReport"
  >
    @for (item of activityReport.items(); track item.label; let i = $index) {
      <k10-list-item [data]="item" [appEditActivity]="item" #edit="appEditActivity" />
      <k10-modal [isOpen]="edit.isOpen()" title="Éditer l'événement" (closed)="edit.close()">
        <div class="activity-edit-form">
          <k10-form-field label="Libellé" [inputId]="'act-label-' + i">
            <k10-input [id]="'act-label-' + i" [(ngModel)]="edit.draft.label" />
          </k10-form-field>
          <k10-form-field label="Type d'activité" [inputId]="'act-type-' + i">
            <k10-input [id]="'act-type-' + i" [(ngModel)]="edit.draft.activityType" />
          </k10-form-field>
          <k10-form-field label="Durée" [inputId]="'act-duration-' + i">
            <k10-input [id]="'act-duration-' + i" [(ngModel)]="edit.draft.duration" />
          </k10-form-field>
          <k10-form-field label="Notes" [inputId]="'act-notes-' + i">
            <k10-input [id]="'act-notes-' + i" [(ngModel)]="edit.draft.notes" />
          </k10-form-field>
        </div>
        <div modal-footer class="activity-edit-form__footer">
          <k10-button variant="ghost" size="sm" (clicked)="edit.close()">Annuler</k10-button>
          <k10-button size="sm" (clicked)="edit.save()">Enregistrer</k10-button>
        </div>
      </k10-modal>
    }
  </div>
</section>
