@if (visible()) {
  <div
    role="alert"
    class="alert"
    [class.alert--info]="variant() === 'info'"
    [class.alert--success]="variant() === 'success'"
    [class.alert--warning]="variant() === 'warning'"
    [class.alert--error]="variant() === 'error'"
  >
    <span class="alert__icon-wrap" aria-hidden="true">
      @if (variant() === 'info') {
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <circle cx="10" cy="10" r="9" stroke="currentColor" stroke-width="1.5"/>
          <path d="M10 9v5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <circle cx="10" cy="6.5" r="0.75" fill="currentColor"/>
        </svg>
      } @else if (variant() === 'success') {
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <circle cx="10" cy="10" r="9" stroke="currentColor" stroke-width="1.5"/>
          <path d="M6.5 10l2.5 2.5 4.5-4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      } @else if (variant() === 'warning') {
        <svg width="22" height="19" viewBox="0 0 22 19" fill="none">
          <path d="M11 1L21 18H1L11 1Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
          <path d="M11 8v4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <circle cx="11" cy="14.5" r="0.75" fill="currentColor"/>
        </svg>
      } @else {
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <circle cx="10" cy="10" r="9" stroke="currentColor" stroke-width="1.5"/>
          <path d="M7 7l6 6M13 7l-6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      }
    </span>

    <div class="alert__body">
      @if (title()) {
        <p class="alert__title">{{ title() }}</p>
      }
      @if (description()) {
        <p class="alert__description">{{ description() }}</p>
      }
      <ng-content></ng-content>
    </div>

    @if (dismissible()) {
      <button type="button" class="alert__dismiss" (click)="onDismiss()" aria-label="Fermer">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
          <path d="M1 1l10 10M11 1L1 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
    }
  </div>
}
