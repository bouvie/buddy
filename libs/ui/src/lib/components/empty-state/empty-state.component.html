<div
  class="empty-state"
  [class.empty-state--sm]="safeSize() === 'sm'"
  [class.empty-state--md]="safeSize() === 'md'"
  [class.empty-state--lg]="safeSize() === 'lg'"
>
  <div class="empty-state__icon" aria-hidden="true">
    <ng-content select="[empty-state-icon]">
      <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
        <circle cx="24" cy="24" r="20" stroke="currentColor" stroke-width="1.5" stroke-dasharray="4 4"/>
        <path d="M24 16v8M24 28v.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </ng-content>
  </div>
  @if (title()) {
    <h3 class="empty-state__title">{{ title() }}</h3>
  }
  @if (description()) {
    <p class="empty-state__description">{{ description() }}</p>
  }
  @if (actionLabel()) {
    <button type="button" class="empty-state__action" (click)="actionClicked.emit()">
      {{ actionLabel() }}
    </button>
  }
  <ng-content></ng-content>
</div>
