<main class="dashboard">
  <header class="dashboard__header">
    <h1 class="dashboard__title">Dashboard</h1>
    <p class="dashboard__subtitle">Overview of today's health metrics</p>
  </header>

  <section class="dashboard__grid" aria-label="Health charts">
    <k9-chart-card appHeartRateChart></k9-chart-card>
    <k9-chart-card appSleepTimeChart></k9-chart-card>

    <k9-card class="dashboard__map-card" title="Position Map" padding="none" elevation="sm">
      <k9-map height="360px" />
    </k9-card>
  </section>
</main>
